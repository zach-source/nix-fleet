# NixFleet Fleet Inventory
# Production hosts managed by NixFleet

groups:
  gtr:
    hosts:
      - gtr-150
      - gtr-151
      - gtr-152
      - gtr-153
    vars:
      max_parallel: 4
      hardware: "Ryzen AI MAX+ 395"
      vram: "131GB unified (LPDDR5X-8000)"
      gpu: "Radeon 8060S (gfx1151)"
      backend: "ROCm/HIP"

  infra:
    hosts:
      - gti
    vars:
      max_parallel: 1

  all:
    children:
      - infra
      - gtr

hosts:
  gti:
    base: ubuntu
    addr: 192.168.3.131
    ssh_user: ztaylor
    roles:
      - base
      - k0s-controller
      - netboot-server
      - dns
      - installer

  gtr-150:
    base: ubuntu
    addr: 192.168.3.133
    ssh_user: deploy
    roles:
      - base
      - k0s-worker
      - llm-inference
      - embeddings
      - reranker
      - safety-filter
      - code-completion
      - agent-orchestrator
      - whisper-stt
      - rpc-worker
    services:
      - port: 8080
        model: gemma-4-26B-A4B-it-Q4_K_M
        role: primary-llm
        tok_s: 53
      - port: 8090
        model: nomic-embed-text-v2-moe-Q8_0
        role: embeddings
        notes: "768-dim, kept for back-compat; superseded by qwen3-embedding :8096"
      - port: 8091
        model: shieldgemma-2b-Q8_0
        role: safety
        notes: "English binary safe/unsafe; superseded by qwen3guard :8098"
      - port: 8092
        model: qwen2.5-coder-1.5b-instruct-q8_0
        role: code-completion
        tok_s: 107
      - port: 8093
        model: Qwen3.5-9B-Q4_K_M
        role: orchestrator
        tok_s: 33
      - port: 8094
        model: whisper-large-v3-turbo
        role: stt
        notes: "Upgraded from base.en 2026-06-18 — lower WER, CPU"
      - port: 8095
        model: jina-reranker-v2-base-multilingual-Q8_0
        role: reranker
      - port: 8096
        model: Qwen3-Embedding-8B-Q8_0
        role: embeddings
        notes: "SOTA 4096-dim, #1 MTEB 70.6, 32K ctx"
      - port: 8097
        model: Qwen3-Reranker-8B-Q8_0
        role: reranker
        notes: "SOTA cross-encoder, normalized 0-1 scores"
      - port: 8098
        model: Qwen3Guard-Gen-4B-Q8_0
        role: safety
        notes: "Multilingual safety classifier (added 2026-06-18); additive to :8091"
      - port: 50052
        role: rpc-worker

  gtr-151:
    base: ubuntu
    addr: 192.168.3.132
    ssh_user: deploy
    roles:
      - base
      - k0s-worker
      - llm-inference
      - rpc-worker
    services:
      - port: 8084
        model: Qwen3.6-35B-A3B-UD-Q6_K_XL
        role: primary-llm
        tok_s: 41-59
        draft: Qwen3.5-0.8B-Q4_K_M
        notes: "MoE + classic draft (86-95% accept). Fork retired — clean upstream /opt/llama-rocm-latest (PR #19493). MTP crashes the recurrent MoE."
      - port: 8085
        model: Qwen3.6-27B-MTP-UD-Q6_K_XL
        role: primary-llm
        tok_s: 16
        notes: "Dense + MTP self-speculation (no draft model). Quality/coding tier."
      - port: 50052
        role: rpc-worker

  gtr-152:
    base: ubuntu
    addr: 192.168.3.134
    ssh_user: deploy
    roles:
      - base
      - k0s-worker
      - llm-inference
      - rpc-worker
    services:
      - port: 8082
        model: Qwen3-Coder-30B-A3B-Instruct-Q4_K_M
        role: primary-llm
        tok_s: 95-124
        draft: Qwen3-0.6B-Q4_K_M
        notes: "Throughput king. SWE-bench 40%."
      - port: 50052
        role: rpc-worker

  gtr-153:
    base: ubuntu
    addr: 192.168.3.130
    ssh_user: deploy
    roles:
      - base
      - k0s-worker
      - llm-inference
      - code-sandbox
      - rpc-worker
    services:
      - port: 8082
        model: Qwopus3.5-9B-coder-Exp-Q8_0
        role: primary-llm
        notes: "Coder (qwen35 arch); replaced MiniMax-M2.7"
      - port: 2358
        model: judge0
        role: code-sandbox
        notes: "47 languages, Docker Compose, privileged"
      - port: 50052
        role: rpc-worker

# K8s services (on gti k0s cluster, managed by Flux)
k8s:
  litellm:
    namespace: litellm
    url: https://llm.stigen.home
    port: 4000
    role: ai-gateway
    notes: "Routes all models, OpenAI-compatible, API key sk-nixfleet-2026"

  open-webui:
    namespace: open-webui
    url: https://chat.stigen.home
    role: chat-ui

  librechat:
    namespace: librechat
    url: https://libre.stigen.home
    role: chat-ui
    notes: "MCP agents, multi-user"

  lobechat:
    namespace: lobechat
    url: https://lobe.stigen.home
    role: chat-ui
    notes: "Access code: nixfleet"
